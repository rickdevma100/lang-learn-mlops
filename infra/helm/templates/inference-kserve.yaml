apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: lang-learn-inference
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lang-learn.labels" . | nindent 4 }}
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/autoscalerClass: hpa
spec:
  predictor:
    minReplicas: {{ .Values.inference.minReplicas }}
    maxReplicas: {{ .Values.inference.maxReplicas }}
    containers:
      - name: kserve-container
        image: "{{ .Values.inference.image.repository }}:{{ .Values.inference.image.tag }}"
        imagePullPolicy: {{ .Values.inference.image.pullPolicy }}
        ports:
          - name: http
            containerPort: 3000
            protocol: TCP
        env:
          - name: LANG_LEARN_MODEL_PATH
            value: {{ .Values.inference.model.path | quote }}
          - name: BACKEND
            value: "llamacpp"
          - name: PROMPTS_DIR
            value: "/app/prompts"
          - name: HF_HUB_OFFLINE
            value: "1"
          - name: REDIS_HOST
            value: "redis-stack"
          - name: REDIS_PORT
            value: "6379"
        resources:
          requests:
            memory: {{ .Values.inference.resources.requests.memory | quote }}
            cpu: {{ .Values.inference.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.inference.resources.limits.memory | quote }}
            cpu: {{ .Values.inference.resources.limits.cpu | quote }}
        volumeMounts:
          - name: model-storage
            mountPath: /app/models
            readOnly: true
          - name: prompts
            mountPath: /app/prompts
            readOnly: true
        readinessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 180
          periodSeconds: 10
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 240
          periodSeconds: 30
          failureThreshold: 5
    volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-storage
      - name: prompts
        configMap:
          name: prompts
