namespace: lang-learn

# ---------------------------------------------------------------------------
# MinIO (DVC remote object store)
# ---------------------------------------------------------------------------
minio:
  enabled: true

  rootUser: minioadmin
  rootPassword: minioadmin

  mode: standalone

  persistence:
    enabled: true
    size: 30Gi
    storageClass: "microk8s-hostpath"

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

  buckets:
    - name: dvc-store
      policy: none
      purge: false

  service:
    type: ClusterIP
    port: 9000

  consoleService:
    type: ClusterIP
    port: 9001

  metrics:
    serviceMonitor:
      enabled: false

# ---------------------------------------------------------------------------
# Inference (KServe + BentoML)
# ---------------------------------------------------------------------------
inference:
  image:
    repository: rickdevma100/lang-learn-kserve
    tag: latest
    pullPolicy: Always

  replicas: 1

  minReplicas: 1
  maxReplicas: 3

  scaleTarget: 1

  model:
    path: /app/models/gemma-q4/gemma-4-E4B-it-Q4_K_M.gguf
    dtype: bfloat16
    quantization: none
    useFlashAttention: true

  resources:
    requests:
      memory: "16Gi"
      cpu: "4"
    limits:
      memory: "24Gi"
      cpu: "4"

# ---------------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------------
frontend:
  enabled: true
  image:
    repository: rickdevma100/lang-learn-frontend
    tag: latest
  replicas: 1

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  host: langlearn.local
  inferenceHost: inference.langlearn.local

# ---------------------------------------------------------------------------
# Prompts (inlined for ConfigMap)
# ---------------------------------------------------------------------------
prompts:
  image_describe: |
    You are a German language tutor.
    Describe the image in simple German.
    Use A1 vocabulary.
    Explain difficult words in English.
  scenario_dialogue: |
    Generate a natural German conversation between exactly two people, including their English translations.

    Requirements:
    - Alternate clearly between Person A and Person B.
    - For each turn, write the German sentence first, followed immediately by its English translation on the next line starting with "Translation: ".
    - The conversation must contain at least 30 sentences total.
    - Use simple and natural German suitable for A1–A2 level learners.
    - The dialogue should sound realistic and practical for daily life situations.
    - Keep the grammar simple and beginner-friendly.
    - Do not include explanations, notes, titles, or formatting symbols.

    Specific Scenario for this conversation:
    {scenario}

    Start the conversation now:
    Person A:

  explain_word: |
    You are a German language expert. Explain the German word "{word}" for a beginner learner.

    Respond with ONLY a JSON object. Do NOT wrap it in code blocks. Do NOT add any text before or after the JSON.

    The JSON must have these fields:
    - "word": the German word
    - "part_of_speech": part of speech (include gender for nouns, e.g. "noun (feminine)")
    - "meaning": English translation and brief explanation
    - "example_sentence_german": a simple A1-A2 level German sentence using the word
    - "example_sentence_english": English translation of that sentence
    - "synonyms": array of objects with "word" (German) and "english" (English) keys, 2-3 items

    Example output format:
    {{"word": "Hund", "part_of_speech": "noun (masculine)", "meaning": "dog - a common pet animal", "example_sentence_german": "Der Hund spielt im Garten.", "example_sentence_english": "The dog plays in the garden.", "synonyms": [{{"word": "Tier", "english": "animal"}}, {{"word": "Welpe", "english": "puppy"}}]}}

    Now explain the word "{word}":



# ---------------------------------------------------------------------------
# Monitoring (Prometheus / Grafana / AlertManager)
# ---------------------------------------------------------------------------
monitoring:
  enabled: true

  adminEmail: "rickdev.ma100@gmail.com"

  # Gmail SMTP — use an App Password (not your normal Gmail password)
  # Generate at: https://myaccount.google.com/apppasswords
  smtpSmarthost: "smtp.gmail.com:587"
  smtpFrom: "rickdev.ma100@gmail.com"
  smtpUser: "rickdev.ma100@gmail.com"
  # smtpPassword stored in K8s Secret: alertmanager-smtp-secret  key: smtp-password
