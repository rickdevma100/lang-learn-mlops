namespace: lang-learn

# ---------------------------------------------------------------------------
# MinIO (DVC remote object store)
# ---------------------------------------------------------------------------
minio:
  enabled: true

  rootUser: minioadmin
  rootPassword: minioadmin

  mode: standalone

  persistence:
    enabled: true
    size: 30Gi
    storageClass: "microk8s-hostpath"

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

  buckets:
    - name: dvc-store
      policy: none
      purge: false

  service:
    type: ClusterIP
    port: 9000

  consoleService:
    type: ClusterIP
    port: 9001

  metrics:
    serviceMonitor:
      enabled: false

# ---------------------------------------------------------------------------
# Inference (KServe + BentoML)
# ---------------------------------------------------------------------------
inference:
  image:
    repository: rickdevma100/lang-learn-kserve
    tag: latest
    pullPolicy: Always

  # replicas: 1

  minReplicas: 1
  maxReplicas: 2

  scaleTarget: 1

  model:
    path: /app/models/gemma-q4/google_gemma-4-E2B-it-Q4_K_M.gguf
    dtype: bfloat16
    quantization: none
    useFlashAttention: true

  resources:
    requests:
      memory: "4Gi"
      cpu: "2"
    limits:
      memory: "8Gi"
      cpu: "4"

# ---------------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------------
frontend:
  enabled: true
  image:
    repository: rickdevma100/lang-learn-frontend
    tag: latest
  replicas: 1

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  host: langlearn.local
  inferenceHost: inference.langlearn.local

# ---------------------------------------------------------------------------
# Prompts (inlined for ConfigMap)
# ---------------------------------------------------------------------------
prompts:
  image_describe: |
    You are a German language tutor.
    Describe the image in simple German.
    Use A1 vocabulary.
    Explain difficult words in English.
  scenario_dialogue: |
    Generate a natural German conversation between exactly two people, including their English translations.

    Requirements:
    - Alternate clearly between Person A and Person B.
    - For each turn, write the German sentence first, followed immediately by its English translation on the next line starting with "Translation: ".
    - The conversation must contain at least 18 conversational turns in total (9 turns for Person A and 9 turns for Person B).
    - Ensure the dialogue is detailed, meeting the 18-turn requirement before stopping.
    - Use simple and natural German suitable for A1-A2 level learners.
    - The dialogue should sound realistic and practical for daily life situations.
    - Keep the grammar simple and beginner-friendly.
    - Do not include explanations, notes, titles, or formatting symbols.
    - Do NOT number the turns. Do NOT put numbers before Person A or Person B.

    Specific Scenario for this conversation:
    {scenario}

    Start the conversation now:
    Person A:

  explain_word: |
    You are a German language expert. Explain the German word "{word}" for a beginner learner.

    Respond with ONLY a JSON object. Do NOT wrap it in code blocks. Do NOT add any text before or after the JSON.

    The JSON must have these fields:
    - "word": the German word
    - "part_of_speech": part of speech (include gender for nouns, e.g. "noun (feminine)")
    - "meaning": English translation and brief explanation
    - "example_sentence_german": a simple A1-A2 level German sentence using the word
    - "example_sentence_english": English translation of that sentence
    - "synonyms": array of objects with "word" (German) and "english" (English) keys, 2-3 items

    Example output format:
    {{"word": "Hund", "part_of_speech": "noun (masculine)", "meaning": "dog - a common pet animal", "example_sentence_german": "Der Hund spielt im Garten.", "example_sentence_english": "The dog plays in the garden.", "synonyms": [{{"word": "Tier", "english": "animal"}}, {{"word": "Welpe", "english": "puppy"}}]}}

    Now explain the word "{word}":

  practice_check: |
    You are a German language tutor checking a student's practice answer.

    The student is practising an {level}-level German dialogue about: "{scenario}".
    The student is writing as {speaker}.

    CONVERSATION CONTEXT (the lines just before the student's turn):
    ---
    {preceding_context}
    ---

    The EXPECTED MEANING of the student's line (in English):
    "{expected_english}"

    The STUDENT WROTE (in German):
    "{user_text}"

    Your job:
    1. Is the student's German sentence GRAMMATICALLY CORRECT for {level}-level German?
    2. Does the student's sentence FIT THE CONVERSATION CONTEXT and match the expected meaning?

    IMPORTANT RULES:
    - The student does NOT need to write the exact same sentence as the original. Any German sentence that conveys the same or very similar meaning is CORRECT.
    - Accept synonyms, alternative phrasings, and different word order if the meaning is preserved.
    - For A1-A2 level, do NOT flag informal/formal register differences as errors unless it changes the meaning.
    - Simple spelling mistakes in German (like missing umlauts) should be noted gently but not marked as grammar_ok=false.
    - If the sentence is grammatically correct and on-topic, ALWAYS return grammar_ok=true and on_topic=true. Do NOT be overly strict.

    Respond with ONLY a JSON object. No markdown, no ```, no explanation outside the JSON.
    The JSON must have exactly these fields:
    - "grammar_ok": true if the German is grammatically acceptable, false only for clear grammar errors
    - "on_topic": true if the sentence fits the conversation context and expected meaning, false only if completely unrelated
    - "feedback": a short, encouraging explanation in simple English. If correct, say "Perfect!" or praise the student. If there's an error, explain what's wrong and show the correction. Maximum 2 sentences.
    - "corrected_text": the corrected German sentence ONLY if grammar_ok is false. Set to null if grammar_ok is true.
    - "score": a number from 0.0 to 1.0. Use 1.0 for perfect, 0.8 for minor issues, 0.5 for grammar errors, 0.3 for off-topic.

    Output the JSON now:



# ---------------------------------------------------------------------------
